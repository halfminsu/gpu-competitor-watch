<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>경쟁사 아침 브리핑 — 생성 도구</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="page">
  <h1>경쟁사 아침 브리핑 — 생성 도구</h1>
  <p class="subtitle">입력 → 편집(중요도 조정) → 저장 → 배포까지 한 화면에서 처리합니다. (외부 자동 수집 없이 직접 입력)</p>

  <section class="block">
    <h2>과거 브리핑 불러오기</h2>
    <div id="history-list" class="history-list"></div>
  </section>

  <section class="block">
    <h2>① 기본 정보</h2>
    <div class="row">
      <div>
        <label for="f-date">날짜</label>
        <input type="date" id="f-date" />
      </div>
    </div>
    <label for="f-title">제목</label>
    <input type="text" id="f-title" placeholder="경쟁사 아침 브리핑 — 7월 14일" />

    <label for="f-summary">핵심 요약 (카드에 노출)</label>
    <textarea id="f-summary" placeholder="오늘 챙겨야 할 핵심을 2~3줄로"></textarea>

    <div class="tag-manager">
      <div class="tag-manager-title">경쟁사 관리</div>
      <div class="tag-add-row">
        <input type="text" id="f-competitor-add" placeholder="경쟁사 입력 후 Enter (쉼표로 여러 개 가능)" />
        <button type="button" class="btn-secondary" id="add-competitor-btn">추가</button>
      </div>
      <div id="competitor-tags" class="tag-list"></div>
      <button type="button" class="btn-danger-outline" id="delete-competitors-btn">선택 삭제</button>
    </div>

    <div class="tag-manager">
      <div class="tag-manager-title">키워드 관리</div>
      <div class="tag-add-row">
        <input type="text" id="f-keyword-add" placeholder="키워드 입력 후 Enter (쉼표로 여러 개 가능)" />
        <button type="button" class="btn-secondary" id="add-keyword-btn">추가</button>
      </div>
      <div id="keyword-tags" class="tag-list"></div>
      <button type="button" class="btn-danger-outline" id="delete-keywords-btn">선택 삭제</button>
    </div>
  </section>

  <section class="block">
    <h2>② 오늘의 브리핑 항목 (중요도 상·중·하 지정)</h2>
    <div class="actions">
      <button type="button" class="btn-primary" id="collect-btn">자동 수집 (Serper 뉴스 검색)</button>
      <button type="button" class="btn-secondary" id="add-item">+ 항목 직접 추가</button>
    </div>
    <div class="actions">
      <label class="select-all-label"><input type="checkbox" id="select-all-items" /> 전체 선택</label>
      <button type="button" class="btn-danger-outline" id="delete-selected-items-btn">선택 항목 삭제</button>
    </div>
    <div id="collect-status"></div>
    <div id="items-container"></div>
  </section>

  <section class="block">
    <h2>③ 미리보기 (공개 화면에 보일 모습)</h2>
    <div id="preview" class="preview-card"></div>
  </section>

  <section class="block">
    <h2>④ 저장 · 배포</h2>
    <div class="actions">
      <button type="button" class="btn-primary" id="save-btn">저장</button>
      <button type="button" class="btn-deploy" id="deploy-btn">배포</button>
    </div>
    <div id="save-status"></div>
    <div id="deploy-status"></div>
  </section>
</div>

<script src="app.js"></script>
</body>
</html>
